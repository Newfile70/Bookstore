<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懒得起名小书铺 - 管理门户</title>
    <link rel="stylesheet" href="style.css?v=20260401-4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏（类似bookstore.html，但添加管理链接） -->
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <h1><i class="fas fa-book-open"></i> 懒得起名小书铺 - 管理</h1>
                </div>
                <div class="nav-links">
                    <a href="#products" class="nav-link active"><i class="fas fa-book"></i> 产品管理</a>
                    <a href="#orders" class="nav-link"><i class="fas fa-shopping-cart"></i> 订单管理</a>
                    <a href="#moderation" class="nav-link"><i class="fas fa-shield-alt"></i> 内容审核</a>
                    <a href="index.html" id="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- 产品管理区 (A14-A18, C5) -->
    <section class="admin-section" id="products">
        <div class="container">
            <h2>产品管理</h2>
            <button id="add-product-btn" class="btn btn-primary">添加产品</button>
            <div class="admin-search-bar">
                <input type="text" id="admin-search-input" placeholder="搜索产品ID、名称...">
                <button id="admin-search-btn"><i class="fas fa-search"></i></button>
            </div>
<div class="products-grid" id="admin-products-grid"></div>
<div id="products-pagination" class="pagination" style="margin-top: 20px;"></div>
        </div>
    </section>

    <!-- 订单管理区 (A19-A20, B2-B4) -->
    <section class="admin-section" id="orders">
        <div class="container">
            <h2>订单管理</h2>
<div class="orders-list" id="admin-orders-list"></div>
<div id="orders-pagination" class="pagination" style="margin-top: 20px;"></div>
        </div>
    </section>

    <section class="admin-section" id="moderation">
        <div class="container">
            <h2>内容审核</h2>
            <div id="admin-moderation-panel"></div>
        </div>
    </section>

    <!-- 产品编辑模态 (A16-A17, C5) -->
    <div class="modal" id="product-modal">
        <div class="modal-content">
            <form id="product-form">
                <input type="text" id="product-title" placeholder="标题">
                <input type="text" id="product-author" placeholder="作者">
                <input type="number" id="product-price" placeholder="价格">
                <textarea id="product-description" placeholder="描述 (支持HTML)"></textarea>
                <input type="text" id="product-category" placeholder="类别">
                <div>评分由买家评价后自动生成，新上架商品默认显示“暂无评分”。</div>
                <input type="text" id="product-tags" placeholder="标签 (逗号分隔)">
                <div id="photos-upload"> <!-- 多照片上传 (B1) --></div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="admin-script.js?v=20260401-4"></script> 
</body>
</html>
