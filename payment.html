<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付方式 - 懒得起名小书铺</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 支付页面专用样式 */
        .payment-container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            padding: 40px;
            text-align: center;
        }
        .payment-amount {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-color);
            margin: 20px 0;
        }
        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .payment-method-btn {
            flex: 1;
            min-width: 100px;
            padding: 15px 10px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .payment-method-btn i {
            font-size: 24px;
        }
        .payment-method-btn:hover {
            border-color: var(--primary-color);
            background: #f9f5f0;
        }
        .payment-method-btn.selected {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }
        .btn-next {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 20px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <!-- 简单页眉，保持品牌统一 -->
    <header class="header">
        <div class="container">
            <div class="navbar" style="justify-content: center;">
                <div class="logo">
                    <h1><i class="fas fa-book-open"></i> 懒得起名小书铺</h1>
                    <p class="tagline">智能推荐 · 悦读无限</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="payment-container">
                <h2>订单支付</h2>
                <!-- 动态显示从购物车传递的总金额 -->
                <div class="payment-amount" id="payment-amount">¥0.00</div>
                <p>请选择支付方式</p>
                <div class="payment-methods">
                    <button class="payment-method-btn" id="pay-wechat"><i class="fab fa-weixin"></i> 微信</button>
                    <button class="payment-method-btn" id="pay-alipay"><i class="fab fa-alipay"></i> 支付宝</button>
                    <button class="payment-method-btn" id="pay-card"><i class="fas fa-credit-card"></i> 银行卡</button>
                </div>
                <!-- 下一步按钮：点击后携带金额跳转到成功页 -->
                <button class="btn btn-primary btn-next" id="next-btn">下一步</button>
                <a href="bookstore.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回购物车</a>
            </div>
        </div>
    </main>

    <!-- 简洁页脚 -->
    <footer class="footer" style="padding: 30px 0; margin-top: 60px;">
        <div class="container" style="text-align: center; color: rgba(255,255,255,0.7);">
            <p>&copy; 2025-2026 懒得起名小书铺</p>
        </div>
    </footer>

    <script>
        // 从 URL 获取 total 参数（由 bookstore.html 传递）
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        const total = parseFloat(getQueryParam('total')) || 0;
        document.getElementById('payment-amount').textContent = '¥' + total.toFixed(2);

        // 支付方式选中效果（纯视觉，无实际功能）
        const methodBtns = document.querySelectorAll('.payment-method-btn');
        methodBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                methodBtns.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // 下一步：跳转到成功页面，并附带相同金额
        document.getElementById('next-btn').addEventListener('click', function() {
            window.location.href = 'success.html?total=' + total.toFixed(2);
        });
    </script>
</body>
</html>
