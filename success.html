<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="success-page-title">支付成功 - 懒得起名小书铺</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        .success-container {
            max-width: 500px;
            margin: 80px auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            padding: 50px 40px;
            text-align: center;
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .success-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
        }
        .success-amount {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-color);
            margin: 25px 0;
            padding: 15px;
            background: #f9f5f0;
            border-radius: var(--border-radius);
        }
        .btn-home {
            padding: 15px 40px;
            font-size: 18px;
            margin-top: 20px;
        }
        .btn-order {
            padding: 15px 40px;
            font-size: 18px;
            margin-top: 12px;
            display: inline-block;
        }
        .note {
            margin-top: 20px;
            color: var(--text-light);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar" style="justify-content: center;">
                <div class="logo">
                    <h1><i class="fas fa-book-open"></i> <span data-i18n="nav-logo">懒得起名小书铺</span></h1>
                    <p class="tagline" data-i18n="nav-tagline">智能推荐 · 悦读无限</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="success-container">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="success-title" data-i18n="success-title">支付成功</h1>
                <p data-i18n="success-subtitle">感谢您的购买！</p>
                <!-- 显示从支付页传递的金额 -->
                <div class="success-amount" id="success-amount">¥0.00</div>
<!-- 添加支付时间显示 -->
<p class="payment-time" id="payment-time"></p>
                <a href="bookstore.html" class="btn btn-secondary btn-order" id="view-order-btn"><i class="fas fa-receipt"></i> <span data-i18n="success-view-order-btn">查看订单详情</span></a>
                <!-- 返回书店主页 -->
                <a href="bookstore.html" class="btn btn-primary btn-home"><i class="fas fa-home"></i> <span data-i18n="success-back-home-btn">返回主页</span></a>
                <p class="note" data-i18n="success-note">订单详情已发送至您的邮箱</p>
            </div>
        </div>
    </main>

    <footer class="footer" style="padding: 30px 0; margin-top: 60px;">
        <div class="container" style="text-align: center; color: rgba(255,255,255,0.7);">
            <p data-i18n="success-footer-copy">&copy; 2025-2026 懒得起名小书铺</p>
        </div>
    </footer>

    <script>
        // 获取 URL 中的 total 参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        const total = parseFloat(getQueryParam('total')) || 0;
        const poNumber = String(getQueryParam('po') || '').trim();
        document.getElementById('success-amount').textContent = '¥' + total.toFixed(2);
		const orderBtn = document.getElementById('view-order-btn');
		if (orderBtn) {
			orderBtn.href = poNumber
				? `bookstore.html?openOrders=1&po=${encodeURIComponent(poNumber)}`
				: 'bookstore.html?openOrders=1';
		}
		const now = new Date();
        const lang = localStorage.getItem('site_lang') || 'zh';
        const locale = lang === 'en' ? 'en-US' : 'zh-CN';
        const timeLabel = lang === 'en' ? 'Paid at: ' : '支付时间：';
        const formattedTime = now.toLocaleString(locale, {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        }).replace(/\//g, '-');
        document.getElementById('payment-time').textContent = timeLabel + formattedTime;
    </script>
</body>
</html>
